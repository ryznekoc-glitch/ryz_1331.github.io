<!DOCTYPE html>
<html lang="ja">
    <head>
        <link name="viewport" content="width=device-width , initial-scale=1.0">
        <meta charset="UTF-8">
        <title>ログイン - 1331M</title>
        <link rel="stylesheet" href="../css/splogin.css">
        <!---なんか忘れてるかも-->
    </head>
    <body>
        <div class="topblock block">
            <h1>ログイン</h1>
        </div>
        <div class="mainblock block">
            <h6>UserID</h6>
            <p>デフォルトのUserIDは誕生日を4桁で表したものです</p>
            <input type="text" class="input" id="userId">
            <h6>PassWord</h6>
            <p>デフォルトのパスワードはパスワードは名前のイニシャル(小文字)+誕生日の4桁です</p>
            <input type="text" class="input" id="password">
            <br>
            <span>
                <input value="ログイン" class="enter" onclick="verify()" type="button" id="enter">
            </span>
        </div>
        <div class="bottomblock block">
            <p>モバイル版</p>
            <span class="flex">
                <input class="smallbutton" type="button" onclick='location.href="../sp/login.html"'' value="モバイル版" disabled>
                <input class="smallbutton" type="button" onclick='location.href="../pc/login.html"'' value="PC版">
            </span>
        </div>
        <script type="text/javascript" src="../js/login.js"></script>
    </body>
</html>
